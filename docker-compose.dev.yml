version: '3.9'

# Development override - starts only infrastructure services
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up postgres redis

services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: poke_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
